name: polar_app
description: "Polar BLE sensor streaming and recording app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_rust_bridge: 2.11.1
  go_router: ^16.0.0
  shared_preferences: ^2.5.3
  path_provider: ^2.1.0
  share_plus: ^12.0.0

  rust_lib_polar_app:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^19.1.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
